<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Escolar</title>
    <script src="./script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="cabecalho">
        <img src="https://em-content.zobj.net/source/google/274/open-book_1f4d6.png" alt="">
        <h1>Gestão de escola</h1>
    </header>
    <main id="principal"> 
        <section id="cad-aluno">
            <h2>Alunos</h2>
            <button id="btn-open-cad-aluno">Cadastrar Alunos</button>
            <dialog id="modal-aluno">
                <div class="modal-content">
                    <form action="" id="form-aluno">
                    <P class="titulos">Nome do Aluno</P>
                    <input type="text" id="titulo" placeholder="Digite o nome do aluno" required>
                    <select name="" id="selecao-turma" required></select>
                    <button id="btn-cad-aluno">Cadastrar Aluno</button>
                </form>
                </div>
                
            </dialog>
        </section>
        <section id="cad-prof">
            <h2>Cadastrar Professor</h2>
            <button id="btn-open-cad-prof">Cadastrar Professor</button>
            <dialog id="modal-prof">
                <form action="" id="form-prof">
                    <p class="titulos">Nome do Professor</p>
                    <input type="text" id="professor" placeholder="Digite o nome do professor" required>
                    <p class="titulos">Materia do Professor</p>
                    <input type="text" id="materia-prof" placeholder="Digite a Materia do Professor" required>
                    <button id="btn-cad-prof">Cadastrar Professor</button>
                </form>
            </dialog>
        </section>
        <section id="criar-turma">
            <h2>Criar Turma</h2>
            <button id="btn-open-cad-turma">Criar Turma</button>
            <dialog id="modal-turma">
                <form action="" id="form-turma">
                    <p class="titulos">Nome da Turma</p>
                    <input type="text" id="turma" placeholder="Digite o nome da turma" required>
                    <button id="btn-cad-turma">Criar Turma</button>
                </form>
            </dialog>
        </section>
        <section id="lancar-nota">
            <h2>Lançar nota</h2>
             <button id="btn-open-cad-nota">Lançar nota</button>
            <dialog id="modal-nota">
                <form action="" id="form-nota">
                    <p class="titulos">Escolha o Aluno</p>
                    <select name="" id="selecao-aluno" required></select>
                    <p class="titulos">Nota 1</p>
                    <input type="number" id="nota1" placeholder="Nota 1" required>
                    <p class="titulos">Nota 2</p>
                    <input type="number" id="nota2" placeholder="Nota 2" required>
                    <p id="materia-exibida"></p>
                    <p class="titulos">Professor da Matéria</p>
                    <select name="" id="selecao-prof-nota" required></select>
                    <button id="btn-cad-nota">Lançar nota</button>
                </form>
            </dialog>
        </section>
    </main>
    <section id="media">
        <div id="container-tabela">
            <caption>Média dos Alunos</caption>
            <p class="titulos">Selecione a Turma</p> 
            <select name="" id="selecao-filtro-turma"></select>
        </div>
            <table>
                <thead id="cabecalho-tabela">
                    <tr>
                        <th>Aluno</th>
                        <th>Média</th>
                        <th>Nota 1</th>
                        <th>Nota 2</th>
                        <th>Matéria</th>
                        <th>Professor</th>
                    </tr>
                </thead>
                <tbody id="tabela-media">
                </tbody>
            </table>
        </section>
</body>
</html>
